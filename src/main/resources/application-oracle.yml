spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:mypdb
    username: e_recruitment
    password: e_recruitment
    driver-class-name: oracle.jdbc.OracleDriver
    tomcat:
      max-wait: 200000
      max-active: 50
      max-idle: 20
      min-idle: 15
  main:
    allow-circular-references: true
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
